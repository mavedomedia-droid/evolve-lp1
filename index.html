  "AI-Driven Customer Acquisition",
  "Programmatic Media Buying",
  "Performance Marketing Fundamentals",

  "Sustainable Growth Systems",
  "Marketing Automation & Workflows",

// ---------- helpers --------------------------------------------------------
function pushDL(event, payload = {}) {
  if (typeof window === "undefined") return;
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({ event, ...payload });
}
function scrollToId(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ---------- ArrowPattern (SVG motif from the poster) -----------------------
const ArrowPattern = ({ opacity = 0.05 }) => (
  <svg aria-hidden="true" width="100%" height="100%"
    style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
    <defs>
      <pattern id="arrow-pattern" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
        <g stroke={C.peri} strokeWidth="1.3" fill="none" opacity={opacity} transform="translate(18 18)">

// ---------- inline icons ---------------------------------------------------
const Icon = ({ children, size = 16, color = "currentColor", stroke = 2 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"

);
const ArrowUpRight = (p) => <Icon {...p}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></Icon>;
const Calendar = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
const Radio = (p) => <Icon {...p}><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/></Icon>;
const CheckIcon = (p) => <Icon {...p} stroke={3}><polyline points="20 6 9 17 4 12"/></Icon>;
const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const Loader = (p) => <Icon {...p}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></Icon>;
const Twitter = (p) => <Icon {...p}><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></Icon>;
const Linkedin = (p) => <Icon {...p}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></Icon>;
const Instagram = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></Icon>;

// ---------- LOGOS ----------------------------------------------------------
const EvolveEngineLogo = ({ color = C.cream }) => (
  <div className="flex items-center gap-2">
    <svg viewBox="0 0 40 40" width="26" height="26" fill="none">
      <ellipse cx="20" cy="20" rx="16" ry="6" stroke={color} strokeWidth="2" />
      <ellipse cx="20" cy="20" rx="16" ry="6" stroke={color} strokeWidth="2" transform="rotate(60 20 20)" />
      <ellipse cx="20" cy="20" rx="16" ry="6" stroke={color} strokeWidth="2" transform="rotate(120 20 20)" />
      <circle cx="20" cy="20" r="2.5" fill={color} />
    </svg>
    <div className="leading-[0.95]" style={{ fontFamily: FONT_DISPLAY }}>
      <div className="text-[9px] tracking-[0.18em] font-bold" style={{ color }}>EVOLVE</div>
      <div className="text-[9px] tracking-[0.18em] font-bold" style={{ color }}>ENGINE</div>
    </div>
  </div>
);

// ---------- COUNTDOWN ------------------------------------------------------
function useCountdown(target) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const diff = Math.max(0, target.getTime() - now.getTime());
  return {
    days: Math.floor(diff / 86400000),
    hours: Math.floor((diff / 3600000) % 24),
    minutes: Math.floor((diff / 60000) % 60),
    seconds: Math.floor((diff / 1000) % 60),
  };
}

const Countdown = () => {
  const t = useCountdown(EVENT_DATE);
  const units = [
    { v: t.days, l: "DAYS" },
    { v: t.hours, l: "HRS" },
    { v: t.minutes, l: "MIN" },
    { v: t.seconds, l: "SEC" },
  ];
  return (
    <div className="flex items-center gap-3">
      {units.map((u, i) => (
        <Fragment key={u.l}>
          <div className="flex flex-col items-center">
            <div className="text-lg md:text-xl font-bold tabular-nums leading-none"
              style={{ fontFamily: FONT_DISPLAY, color: C.cream }}>
              {String(u.v).padStart(2, "0")}
            </div>
            <div className="text-[8px] md:text-[9px] mt-1 tracking-[0.2em]"
              style={{ fontFamily: FONT_MONO, color: C.peri }}>
              {u.l}
            </div>
          </div>
          {i < units.length - 1 && (
            <div className="text-lg md:text-xl" style={{ color: C.peri, opacity: 0.3 }}>:</div>
          )}
        </Fragment>
      ))}
    </div>
  );
};

// ---------- FORM -----------------------------------------------------------
const Field = ({ label, error, children, required }) => (
  <div className="block">
    <div className="block text-[10px] tracking-[0.15em] mb-1 font-medium"
      style={{ fontFamily: FONT_MONO, color: C.navy }}>
      {label} {required && <span style={{ color: C.red }}>*</span>}
    </div>
    {children}
    {error && <span className="block text-xs mt-1" style={{ color: C.red }}>{error}</span>}
  </div>
);

const inputClass = "w-full px-3 py-2 bg-white border rounded-none focus:outline-none transition-colors text-[13.5px] text-black placeholder:text-gray-400";

// Multi-select pill picker for attendee "Areas of Interest"
const TopicPicker = ({ value, onChange, error }) => {
  const toggle = (t) => {
    if (value.includes(t)) onChange(value.filter((x) => x !== t));
    else onChange([...value, t]);
  };
  return (
    <div>
      <div className="flex flex-wrap gap-1.5">
        {TOPICS.map((t) => {
          const active = value.includes(t);
          return (
            <button key={t} type="button" onClick={() => toggle(t)}
              className="px-2.5 py-1.5 text-[11px] font-semibold transition-colors text-left"
              style={{
                background: active ? C.ink : "white",
                color: active ? C.cream : C.ink,
                border: `1px solid ${active ? C.ink : `${C.ink}33`}`,
                fontFamily: FONT_MONO,
              }}>
              {t}
            </button>
          );
        })}
      </div>
      {error && <span className="block text-xs mt-1.5" style={{ color: C.red }}>{error}</span>}
    </div>
  );
};

const RegistrationForm = () => {
  const [tab, setTab] = useState("attend");
  const [status, setStatus] = useState("idle");
  const [errors, setErrors] = useState({});
  const [form, setForm] = useState({
    full_name: "", email: "", phone: "",
    linkedin_url: "", city: "",
    areas_of_interest: [],
    role: "",
    organization: "", proposed_topic: "", bio: "", portfolio_url: "",
  });

  const update = (k) => (e) => {
    setForm((s) => ({ ...s, [k]: e.target.value }));
    if (errors[k]) setErrors((er) => ({ ...er, [k]: undefined }));
  };
  const updateTopics = (arr) => {
    setForm((s) => ({ ...s, areas_of_interest: arr }));
    if (errors.areas_of_interest) setErrors((er) => ({ ...er, areas_of_interest: undefined }));
  };

  const validate = () => {
    const e = {};
    if (!form.full_name.trim()) e.full_name = "Required";
    if (!form.email.trim()) e.email = "Required";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "Enter a valid email";
    if (!form.phone.trim()) e.phone = "Required";

    if (tab === "attend") {
      if (!form.linkedin_url.trim()) e.linkedin_url = "Required";
      else if (!/linkedin\.com\//i.test(form.linkedin_url)) e.linkedin_url = "Enter a valid LinkedIn URL";
      if (form.areas_of_interest.length === 0) e.areas_of_interest = "Pick at least one topic";
    } else {
      if (!form.role.trim()) e.role = "Required";
      if (!form.organization.trim()) e.organization = "Required";
      if (!form.proposed_topic.trim()) e.proposed_topic = "Pick a topic";
      if (!form.bio.trim()) e.bio = "Required";
      if (!form.portfolio_url.trim()) e.portfolio_url = "Required";
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = async (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    setStatus("loading");

    const payload = tab === "attend"
      ? { registration_type: "attendee",
          full_name: form.full_name, email: form.email, phone: form.phone,
          linkedin_url: form.linkedin_url,
          areas_of_interest: form.areas_of_interest.join(", "),
          city: form.city,
          timestamp: new Date().toISOString() }
      : { registration_type: "speaker",
          full_name: form.full_name, email: form.email, phone: form.phone,
          role: form.role, organization: form.organization,
          proposed_topic: form.proposed_topic, bio: form.bio,
          portfolio_url: form.portfolio_url,
          timestamp: new Date().toISOString() };

    try {
      await fetch(GAS_ENDPOINT, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      pushDL(tab === "attend" ? "conference_registration" : "speaker_application");
      setStatus("success");
    } catch { setStatus("error"); }
  };

  const closeSuccess = () => {
    setStatus("idle");
    setForm({ full_name: "", email: "", phone: "",
      linkedin_url: "", city: "", areas_of_interest: [],
      role: "", organization: "", proposed_topic: "", bio: "", portfolio_url: "" });
  };

  return (
    <div id="register" className="relative" style={{ fontFamily: FONT_BODY }}>
      <div className="bg-white border" style={{ borderColor: `${C.ink}22` }}>
        <div className="grid grid-cols-2" style={{ borderBottom: `1px solid ${C.ink}22` }}>
          {[{ id: "attend", label: "Attend Conference" },
            { id: "speaker", label: "Become A Speaker" }].map((t) => {
            const active = tab === t.id;
            return (
              <button key={t.id} type="button"
                onClick={() => { setTab(t.id); setErrors({}); }}
                className="relative py-3 text-[12.5px] font-semibold tracking-wide transition-colors"
                style={{ background: active ? C.ink : "white",
                  color: active ? C.cream : `${C.ink}88`,
                  fontFamily: FONT_DISPLAY }}>
                {t.label}
              </button>
            );
          })}
        </div>

        <form onSubmit={submit} className="p-4 md:p-5 space-y-3" noValidate>
          <Field label="FULL NAME" required error={errors.full_name}>
            <input type="text" className={inputClass}
              style={{ borderColor: errors.full_name ? C.red : `${C.ink}33` }}
              value={form.full_name} onChange={update("full_name")} autoComplete="name" />
          </Field>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <Field label="EMAIL" required error={errors.email}>
              <input type="email" className={inputClass}
                style={{ borderColor: errors.email ? C.red : `${C.ink}33` }}
                value={form.email} onChange={update("email")}
                autoComplete="email" inputMode="email" />
            </Field>
            <Field label="PHONE" required error={errors.phone}>
              <input type="tel" className={inputClass}
                style={{ borderColor: errors.phone ? C.red : `${C.ink}33` }}
                value={form.phone} onChange={update("phone")}
                autoComplete="tel" inputMode="tel" />
            </Field>
          </div>

          {tab === "attend" ? (
            <Fragment>
              <Field label="LINKEDIN URL" required error={errors.linkedin_url}>
                <input type="url" className={inputClass}
                  style={{ borderColor: errors.linkedin_url ? C.red : `${C.ink}33` }}
                  value={form.linkedin_url} onChange={update("linkedin_url")}
                  placeholder="https://linkedin.com/in/yourname" />
              </Field>

              <Field label="AREAS OF INTEREST (PICK ONE OR MORE)" required error={errors.areas_of_interest}>
                <TopicPicker value={form.areas_of_interest} onChange={updateTopics} />
              </Field>

              <Field label="CITY (OPTIONAL)">
                <input type="text" className={inputClass}
                  style={{ borderColor: `${C.ink}33` }}
                  value={form.city} onChange={update("city")} placeholder="e.g. Lagos" />
              </Field>
            </Fragment>
          ) : (
            <Fragment>
              <Field label="CURRENT ROLE" required error={errors.role}>
                <input type="text" className={inputClass}
                  style={{ borderColor: errors.role ? C.red : `${C.ink}33` }}
                  value={form.role} onChange={update("role")}
                  placeholder="e.g. Head of Growth" />
              </Field>
              <Field label="ORGANIZATION" required error={errors.organization}>
                <input type="text" className={inputClass}
                  style={{ borderColor: errors.organization ? C.red : `${C.ink}33` }}
                  value={form.organization} onChange={update("organization")} />
              </Field>
              <Field label="PROPOSED TOPIC" required error={errors.proposed_topic}>
                <select className={inputClass}
                  style={{ borderColor: errors.proposed_topic ? C.red : `${C.ink}33`, appearance: "none", backgroundImage: `linear-gradient(45deg, transparent 50%, ${C.ink} 50%), linear-gradient(135deg, ${C.ink} 50%, transparent 50%)`, backgroundPosition: `calc(100% - 14px) 50%, calc(100% - 9px) 50%`, backgroundSize: `5px 5px, 5px 5px`, backgroundRepeat: "no-repeat", paddingRight: "28px" }}
                  value={form.proposed_topic} onChange={update("proposed_topic")}>
                  <option value="">Select a topic...</option>
                  {TOPICS.map((t) => (
                    <option key={t} value={t}>{t}</option>
                  ))}
                </select>
              </Field>
              <Field label="SHORT BIO" required error={errors.bio}>
                <textarea className={inputClass}
                  style={{ borderColor: errors.bio ? C.red : `${C.ink}33`, minHeight: 80 }}
                  value={form.bio} onChange={update("bio")} rows={3} />
              </Field>
              <Field label="PORTFOLIO / LINKEDIN URL" required error={errors.portfolio_url}>
                <input type="url" className={inputClass}
                  style={{ borderColor: errors.portfolio_url ? C.red : `${C.ink}33` }}
                  value={form.portfolio_url} onChange={update("portfolio_url")}
                  placeholder="https://" />
              </Field>
            </Fragment>
          )}

          <motion.button type="submit" disabled={status === "loading"}
            whileTap={{ scale: 0.98 }}
            className="w-full py-3 px-6 font-bold text-[12.5px] tracking-[0.12em] flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed transition-colors"
            style={{ background: C.ink, color: C.cream, fontFamily: FONT_DISPLAY }}>
            {status === "loading" ? (
              <Fragment><Loader size={14} className="animate-spin" /> SUBMITTING…</Fragment>
            ) : (
              <Fragment>
                {tab === "attend" ? "REGISTER FOR FREE" : "APPLY AS SPEAKER"}
                <ArrowUpRight size={15} />
              </Fragment>
            )}
          </motion.button>

          {tab === "attend" && (
            <p className="text-[10.5px] text-center" style={{ color: `${C.ink}88`, fontFamily: FONT_MONO }}>
              LIVE ATTENDANCE IS FREE. RECORDED VERSION SOLD SEPARATELY.
            </p>
          )}

          {status === "error" && (
            <div className="text-xs p-2 text-center" style={{ background: `${C.red}11`, color: C.red }}>
              Something went wrong. Please try again.
            </div>
          )}
        </form>
      </div>

      <AnimatePresence>
        {status === "success" && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
            className="fixed inset-0 z-[100] flex items-center justify-center p-4"
            style={{ background: "rgba(8,9,31,0.85)" }} onClick={closeSuccess}>
            <motion.div initial={{ scale: 0.95, y: 10 }} animate={{ scale: 1, y: 0 }}
              exit={{ scale: 0.95, y: 10 }} transition={{ type: "spring", damping: 22 }}
              onClick={(e) => e.stopPropagation()}
              className="relative max-w-md w-full bg-white p-6" style={{ fontFamily: FONT_BODY }}>
              <button onClick={closeSuccess} className="absolute top-3 right-3 p-1" aria-label="Close">
                <X size={18} />
              </button>
              <div className="w-10 h-10 rounded-full flex items-center justify-center mb-4"
                style={{ background: C.lime }}>
                <CheckIcon size={20} color={C.ink} />
              </div>
              <h3 className="text-xl mb-2 font-bold" style={{ fontFamily: FONT_DISPLAY, color: C.ink }}>
                {tab === "attend" ? "You're in. See you on July 4th." : "Application received."}
              </h3>
              <p className="text-[13.5px] leading-relaxed" style={{ color: "#444" }}>
                {tab === "attend"
                  ? "We've saved your spot. A confirmation with the YouTube Live link is on its way to your inbox."
                  : "Thanks for proposing to speak. We'll review your submission and get back to you over email within a few days."}
              </p>
              <button onClick={closeSuccess}
                className="mt-4 px-4 py-2 font-semibold text-xs tracking-wider"
                style={{ background: C.ink, color: C.cream, fontFamily: FONT_DISPLAY }}>
                CLOSE
              </button>
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
};

    <span className="inline-block w-4 h-px" style={{ background: color }} />
    {children}
  </div>
);

// ---------- HERO -----------------------------------------------------------
const Hero = () => (

          className="md:hidden fixed bottom-0 left-0 right-0 z-50 p-3"

// ---------- ACTIVITY TOAST -------------------------------------------------
const ROLE_NOTES = [
  "A marketer just registered", "A founder just registered",
  "A creator just registered", "A student just registered",
  "A tech professional just registered", "A freelancer just registered",
  "A product manager just registered", "A growth strategist just registered",

];

const ActivityToast = () => {
  const [idx, setIdx] = useState(-1);
  useEffect(() => {
    let i = 0;
    const start = setTimeout(() => {
      setIdx(0);
      const cycle = setInterval(() => {
        i = (i + 1) % ROLE_NOTES.length;
        setIdx(-1);
        setTimeout(() => setIdx(i), 400);
      }, 8000);
      return () => clearInterval(cycle);
    }, 4000);
    return () => clearTimeout(start);
  }, []);
  return (
    <div className="hidden md:block fixed bottom-6 left-6 z-40 pointer-events-none">
      <AnimatePresence>
        {idx >= 0 && (
          <motion.div initial={{ opacity: 0, x: -30 }} animate={{ opacity: 1, x: 0 }}
            exit={{ opacity: 0, x: -30 }} transition={{ duration: 0.4 }}
            className="flex items-center gap-2.5 px-4 py-2.5 max-w-sm"
            style={{ background: C.cream, border: `1px solid ${C.ink}22` }}>
            <div className="w-1.5 h-1.5 rounded-full animate-pulse" style={{ background: C.red }} />
            <span className="text-[12px] font-medium" style={{ color: C.ink, fontFamily: FONT_BODY }}>
              {ROLE_NOTES[idx]}
            </span>
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
};
